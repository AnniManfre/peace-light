  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #F5F1E8 0%, #FFF8DC 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(26, 26, 26, 0.1);
      max-width: 400px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #1A1A1A;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      margin: 20px 0;
    }

    /* Buttons */
    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #D4AF37;
      color: #1A1A1A;
    }

    .btn-primary:hover {
      background: #C9A02D;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    .btn-secondary {
      background: #A8D5D5;
      color: #1A1A1A;
    }

    .btn-secondary:hover {
      background: #95C4C4;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(168, 213, 213, 0.3);
    }

    .btn-tertiary {
      background: #F5F1E8;
      color: #1A1A1A;
      border: 2px solid #D4AF37;
    }

    .btn-tertiary:hover {
      background: #D4AF37;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    .icon {
      font-size: 20px;
    }

    /* Info Section */
    .info-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #F5F1E8;
      font-size: 12px;
      color: #2A2A2A;
      line-height: 1.6;
    }

    .info-section p {
      margin: 8px 0;
    }

    .location {
      color: #D4AF37;
      font-weight: 600;
    }

    /* Footer */
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #A8D5D5;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .logo {
        font-size: 40px;
      }

      .btn {

        font-size: 14px;
      }
    }
