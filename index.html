<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peace & Light</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFF8DC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .header {
      margin-bottom: 50px;
    }

    .logo {
      font-size: 52px;
      font-family: 'Playfair Display', serif;
      color: #D4AF37;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 13px;
      color: #A8A8A8;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 18px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: #D4AF37;
      color: #1A1A1A;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      background: #A8D5D5;
      color: #1A1A1A;
    }

    .btn-secondary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .icon {
      font-size: 18px;
    }

    .info {
      margin-top: 45px;
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }

    .info p {
      margin: 4px 0;
    }

    .location {
      color: #D4AF37;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
      }

      .logo {
        font-size: 44px;
      }

      .btn {
        padding: 16px 18px;
        font-size: 14px;
      }

      .header {
        margin-bottom: 40px;
      }

      .buttons-container {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Peace & Light</div>
      <div class="tagline">Spa Terapéutico</div>
    </div>

    <div class="buttons-container">
      <a href="https://wa.me/541158217155?text=Hola%20Claudia%21%20Me%20interesa%20agendar%20un%20turno" class="btn btn-primary" target="_blank">
        <span class="icon">💬</span>
        Claudia
      </a>

      <a href="https://wa.me/541149864860?text=Hola%20Carina%21%20Me%20interesa%20agendar%20un%20turno" class="btn btn-primary" target="_blank">
        <span class="icon">💬</span>
        Carina
      </a>

      <a href="https://www.tiktok.com/@studiopeaceandlight" class="btn btn-secondary" target="_blank">
        <span class="icon">🎵</span>
        TikTok
      </a>
    </div>

    <div class="info">
      <p class="location">📍 Güemes 3500, Alto Palermo</p>
      <p>Buenos Aires</p>
    </div>
  </div>
</body>
</html>
